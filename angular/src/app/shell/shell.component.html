<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
    <mat-toolbar class="sidenav-header">
      @if (!(isHandset$ | async)) {
        <button matIconButton type="button" aria-label="Chiudi menu" (click)="toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="brand-name">MFM</span>
    </mat-toolbar>

    <mat-nav-list>
      <a mat-list-item routerLink="browse" routerLinkActive="sidenav-selected">
        <mat-icon matListItemIcon>folder_open</mat-icon>
        <span matListItemTitle>I miei file</span>
      </a>
    </mat-nav-list>

    <div class="account">
      <div class="account-copy">
        <strong>{{authState.user()?.name}}</strong>
        <span>{{authState.user()?.email}}</span>
      </div>
      <button matIconButton aria-label="Esci" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    @if (isHandset$ | async) {
      <mat-toolbar class="mobile-header">
        <button matIconButton type="button" aria-label="Apri menu" (click)="toggle()">
          <mat-icon>menu</mat-icon>
        </button>
        <span>Material File Manager</span>
      </mat-toolbar>
    }

    <app-toolbar/>

    <div id="outlet" class="outlet">
      <router-outlet />
    </div>

    <app-breadcrumb/>
  </mat-sidenav-content>
</mat-sidenav-container>
